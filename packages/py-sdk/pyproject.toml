[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "aletheiax"
version = "0.4.0"
description = "Official Python SDK for the AletheiaX perpetuals platform, with an agent-builder toolkit."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "AletheiaX" }]
keywords = ["aletheiax", "solana", "perpetuals", "trading", "defi", "ai-agents", "sdk"]
dependencies = ["httpx>=0.27.0"]

[project.urls]
Homepage = "https://aletheiax.xyz"
Repository = "https://github.com/benjicoll/aletheiax-sdk"

[project.optional-dependencies]
dev = ["pytest>=8.0.0"]

[tool.setuptools.packages.find]
include = ["aletheiax*"]
